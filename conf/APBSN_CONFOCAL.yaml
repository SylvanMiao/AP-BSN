
model:
  type: APBSN
  kwargs:
    pd_a: 4
    pd_b: 2
    pd_pad: 2
    R3: True
    R3_T: 8
    R3_p: 0.16
    bsn: DBSNl
    in_ch: 1
    bsn_base_ch: 128
    bsn_num_module: 9

model_input: [noisy] # e.g.) real_noisy, syn_noisy, clean

trainer: Trainer

training:
  dataset: prep_confocal

  dataset_args:
    add_noise: None # confocal images already contain real noise (shot noise)
    crop_size: [512, 512]  # must be divisible by pd_a (4)
    aug: ['hflip', 'rot']
    n_repeat: 4

  batch_size: 8

  max_epoch: 20

  init_lr: 1e-4
  scheduler:
    type: step
    step:
      step_size: 8
      gamma: 0.1
  loss: 1*self_L1
  tmp_info: []
  optimizer:
    type: Adam
    Adam:
      betas: [0.9, 0.999]

  warmup: False
  warmup_iter: 200

validation:
  dataset: prep_confocal

  dataset_args:
    crop_size: None
    add_noise: None
    n_data: 32

  add_con: 0.5
  floor: True

  val: True
  save_image: True

  start_epoch: 1
  interval_epoch: 1

checkpoint:
  save: True
  start_epoch: 1
  interval_epoch: 1

log:
  interval_iter: 10

test:
  dataset: Confocal

  dataset_args:
    crop_size: None
    add_noise: None

  add_con: 0.0
  floor: False

  save_image: True
